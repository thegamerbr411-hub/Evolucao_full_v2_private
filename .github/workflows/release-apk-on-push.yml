name: Release APK on Push

on:
  push:
    branches:
      - evolucao-app
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Sync and validate release mirror drift
        run: |
          npm run audit:release:sync
          npm run audit:release:check

      - name: Operational preflight
        run: npm run ops:preflight

      - name: Create minimal .env for bundler (CI)
        run: |
          cat > .env << 'EOF'
          EXPO_PUBLIC_API_URL=https://evolucao-api-dou2.onrender.com
          EXPO_PUBLIC_API_BASE_URL=https://evolucao-api-dou2.onrender.com
          EXPO_PUBLIC_APP_VERSION=1.2.5
          EXPO_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.EXPO_PUBLIC_GOOGLE_CLIENT_ID || '910587302920-1rg2n0809vbpqqi3i1tsvs2qptqngtml.apps.googleusercontent.com' }}
          EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID=${{ secrets.EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID || '910587302920-4sls8n06ol9vsedteutiur8mnvdg553q.apps.googleusercontent.com' }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID=${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID || '910587302920-1rg2n0809vbpqqi3i1tsvs2qptqngtml.apps.googleusercontent.com' }}
          EXPO_PUBLIC_GOOGLE_EXPO_CLIENT_ID=910587302920-4sls8n06ol9vsedteutiur8mnvdg553q.apps.googleusercontent.com
          EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID=placeholder
          EXPO_PUBLIC_FIREBASE_API_KEY=${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY || 'AIzaSyAQB2GY4vPqxrHxrkjC8T7q1wT8hyOta44' }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=t-evo-b069a.firebaseapp.com
          EXPO_PUBLIC_FIREBASE_PROJECT_ID=t-evo-b069a
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=t-evo-b069a.firebasestorage.app
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=910587302920
          EXPO_PUBLIC_FIREBASE_APP_ID=1:910587302920:android:c9cd63ea51c3fbc15d2dbd
          EXPO_PUBLIC_QA_API_BASE_URL=http://localhost:3000
          EXPO_PUBLIC_QA_CLIENT_ID=admin
          EXPO_PUBLIC_QA_API_KEY=ci-placeholder
          EOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Generate debug keystore for signing
        run: |
          if [ ! -f android/app/debug.keystore ]; then
            keytool -genkeypair -v \
              -keystore android/app/debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "[CI] debug.keystore gerado com sucesso"
          else
            echo "[CI] debug.keystore ja existe"
          fi

      - name: Build Android APK (Gradle assembleRelease)
        id: gradle_build
        env:
          NODE_ENV: production
          NODE_OPTIONS: --max_old_space_size=4096
        run: |
          cd android
          chmod +x gradlew
          ./gradlew --no-daemon --stacktrace assembleRelease
          APK_PATH="$(find app/build/outputs/apk -type f -name '*release*.apk' | sort | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            APK_PATH="$(find app/build/outputs/apk -type f -name '*.apk' | sort | head -n 1)"
          fi
          if [ -z "$APK_PATH" ]; then
            echo "No APK found under android/app/build/outputs/apk"
            find app/build/outputs -maxdepth 6 -type f | sort || true
            exit 1
          fi
          echo "Selected APK: $APK_PATH"
          APK_NAME="evolucao-${GITHUB_SHA::8}.apk"
          cp "$APK_PATH" "../$APK_NAME"
          cd ..
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: ${{ steps.gradle_build.outputs.apk_name }}
          retention-days: 14

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.ref_name }}-${{ github.run_number }}
          name: APK ${{ github.ref_name }} #${{ github.run_number }}
          body: |
            Build automatica de APK para instalacao no Android.

            Commit: ${{ github.sha }}
            Build Type: local Gradle assembleRelease
          prerelease: false
          files: ${{ steps.gradle_build.outputs.apk_name }}
