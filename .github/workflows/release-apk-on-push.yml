name: Release APK on Push

on:
  push:
    branches:
      - evolucao-app
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Sync and validate release mirror drift
        run: |
          npm run audit:release:sync
          npm run audit:release:check

      - name: Operational preflight
        run: npm run ops:preflight

      - name: Build Android APK (Gradle assembleRelease)
        id: gradle_build
        env:
          NODE_ENV: production
          NODE_OPTIONS: --max_old_space_size=4096
        run: |
          cd android
          chmod +x gradlew
          ./gradlew --no-daemon assembleRelease
          cd ..
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "APK not found at $APK_PATH"
            exit 1
          fi
          APK_NAME="evolucao-${GITHUB_SHA::8}.apk"
          cp "$APK_PATH" "$APK_NAME"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: ${{ steps.gradle_build.outputs.apk_name }}
          retention-days: 14

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.ref_name }}-${{ github.run_number }}
          name: APK ${{ github.ref_name }} #${{ github.run_number }}
          body: |
            Build automatica de APK para instalacao no Android.

            Commit: ${{ github.sha }}
            Build Type: local Gradle assembleRelease
          prerelease: false
          files: ${{ steps.gradle_build.outputs.apk_name }}
