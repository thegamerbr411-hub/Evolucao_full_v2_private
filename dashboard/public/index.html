<!doctype html>
<html lang="pt-BR">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>QA Dashboard V2</title>
	<style>
		:root {
			--bg: #0f172a;
			--bg-soft: #111827;
			--surface: #1f2937;
			--surface-2: #273449;
			--text: #e5e7eb;
			--muted: #94a3b8;
			--ok: #22c55e;
			--warn: #f59e0b;
			--danger: #ef4444;
			--accent: #06b6d4;
			--border: #334155;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			color: var(--text);
			background:
				radial-gradient(900px 450px at 90% -20%, rgba(6, 182, 212, 0.15), transparent 70%),
				radial-gradient(1000px 500px at -10% 10%, rgba(34, 197, 94, 0.08), transparent 70%),
				var(--bg);
		}

		.container {
			max-width: 1180px;
			margin: 0 auto;
			padding: 20px;
			display: grid;
			gap: 16px;
		}

		.card {
			border: 1px solid var(--border);
			border-radius: 14px;
			background: linear-gradient(180deg, var(--surface) 0%, var(--surface-2) 100%);
			padding: 14px;
		}

		.top {
			display: grid;
			gap: 10px;
			grid-template-columns: 2fr 1fr;
		}

		.title {
			font-size: 20px;
			margin: 0 0 8px;
			letter-spacing: 0.2px;
		}

		.chips {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
		}

		.chip {
			border: 1px solid var(--border);
			border-radius: 999px;
			padding: 6px 10px;
			color: var(--muted);
			font-size: 12px;
			background: rgba(15, 23, 42, 0.45);
		}

		.status-ok {
			color: var(--ok);
			border-color: rgba(34, 197, 94, 0.35);
		}

		.status-warn {
			color: var(--warn);
			border-color: rgba(245, 158, 11, 0.35);
		}

		.status-danger {
			color: var(--danger);
			border-color: rgba(239, 68, 68, 0.35);
		}

		.grid {
			display: grid;
			gap: 14px;
			grid-template-columns: 1.8fr 1fr;
		}

		.list {
			display: grid;
			gap: 8px;
			max-height: 430px;
			overflow: auto;
			padding-right: 4px;
		}

		.item {
			border: 1px solid var(--border);
			border-radius: 12px;
			background: rgba(2, 6, 23, 0.38);
			padding: 10px;
			display: grid;
			gap: 8px;
		}

		.row {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 8px;
		}

		.mono {
			font-family: Consolas, "Courier New", monospace;
			font-size: 12px;
			color: #cbd5e1;
			word-break: break-all;
		}

		.actions {
			display: flex;
			gap: 8px;
			flex-wrap: wrap;
		}

		button,
		input,
		select {
			border: 1px solid var(--border);
			border-radius: 10px;
			background: #0b1220;
			color: var(--text);
			padding: 9px 11px;
			font-size: 13px;
		}

		button {
			cursor: pointer;
			transition: transform 120ms ease, border-color 120ms ease;
		}

		button:hover {
			transform: translateY(-1px);
			border-color: rgba(6, 182, 212, 0.5);
		}

		.btn-accent {
			border-color: rgba(6, 182, 212, 0.5);
			color: #67e8f9;
		}

		.muted {
			color: var(--muted);
			font-size: 12px;
		}

		.select-compact {
			padding: 7px 10px;
			min-width: 130px;
		}

		.metrics {
			display: grid;
			gap: 8px;
			grid-template-columns: repeat(2, minmax(0, 1fr));
		}

		.metric {
			border: 1px dashed var(--border);
			border-radius: 10px;
			padding: 9px;
		}

		.queue-list {
			max-height: 220px;
			overflow: auto;
			display: grid;
			gap: 6px;
		}

		.learning-list {
			max-height: 220px;
			overflow: auto;
			display: grid;
			gap: 6px;
		}

		.section-title {
			font-size: 16px;
			margin: 0;
		}

		.queue-title {
			margin: 12px 0 8px;
			font-size: 14px;
		}

		@media (max-width: 920px) {
			.top,
			.grid {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>
<body>
	<main class="container">
		<section class="top">
			<article class="card">
				<h1 class="title">Dashboard QA - Bugs, Fila e Decisões</h1>
				<div class="chips">
					<span id="sessionChip" class="chip status-warn">Sessão: sem token</span>
					<span id="clientChip" class="chip">Cliente: default</span>
					<span id="workerChip" class="chip">Worker: idle</span>
					<span id="queueChip" class="chip">Fila: 0</span>
				</div>
			</article>

			<article class="card">
				<div class="actions">
					<input id="adminUser" placeholder="admin user/email" />
					<input id="adminPass" type="password" placeholder="admin password" />
					<input id="clientId" placeholder="client id" value="admin" />
					<button id="btnLogin" class="btn-accent">Login</button>
					<button id="btnRefresh">Atualizar</button>
				</div>
			</article>
		</section>

		<section class="grid">
			<article class="card">
				<div class="row">
					<h2 class="title section-title">Bugs (abertos e em retest)</h2>
					<span id="bugsCount" class="muted">0 itens</span>
				</div>
				<div id="bugsList" class="list"></div>
			</article>

			<article class="card">
				<h2 class="title section-title">Status Operacional</h2>
				<div class="metrics" id="metrics"></div>
				<h3 class="queue-title">IA</h3>
				<div class="chips">
					<span id="aiStatusChip" class="chip">IA: idle</span>
				</div>
				<div id="learningList" class="learning-list"></div>
				<h3 class="queue-title">Fila/Worker</h3>
				<div id="queueList" class="queue-list"></div>
			</article>
		</section>
	</main>

	<script>
		const state = {
			adminToken: localStorage.getItem('qa_admin_v2') || '',
			clientToken: localStorage.getItem('qa_client_token_v2') || '',
			clientId: localStorage.getItem('qa_client_id_v2') || 'admin',
			bugs: [],
				learningSummary: null,
				aiStatus: null,
			retests: { active: [], history: [] },
		};

		const el = {
			adminUser: document.getElementById('adminUser'),
			adminPass: document.getElementById('adminPass'),
			bugsCount: document.getElementById('bugsCount'),
			bugsList: document.getElementById('bugsList'),
			btnLogin: document.getElementById('btnLogin'),
			btnRefresh: document.getElementById('btnRefresh'),
			clientChip: document.getElementById('clientChip'),
			clientId: document.getElementById('clientId'),
			metrics: document.getElementById('metrics'),
				aiStatusChip: document.getElementById('aiStatusChip'),
				learningList: document.getElementById('learningList'),
			queueChip: document.getElementById('queueChip'),
			queueList: document.getElementById('queueList'),
			sessionChip: document.getElementById('sessionChip'),
			workerChip: document.getElementById('workerChip'),
		};

		function authHeaders() {
			return {
				'content-type': 'application/json',
				'x-qa-local': '1',
				'x-qa-client-id': state.clientId || 'admin',
				...(state.clientToken ? { authorization: `Bearer ${state.clientToken}` } : {}),
			};
		}

		function saveSession() {
			localStorage.setItem('qa_admin_v2', state.adminToken || '');
			localStorage.setItem('qa_client_token_v2', state.clientToken || '');
			localStorage.setItem('qa_client_id_v2', state.clientId || 'admin');
		}

		function setSessionChip() {
			const hasToken = Boolean(state.adminToken || state.clientToken);
			el.sessionChip.textContent = hasToken ? 'Sessão: autenticada (token carregado)' : 'Sessão: sem token';
			el.sessionChip.className = `chip ${hasToken ? 'status-ok' : 'status-warn'}`;
			el.clientChip.textContent = `Cliente: ${state.clientId || 'admin'}`;
			el.clientId.value = state.clientId || 'admin';
		}

		function bySeverity(item) {
			const map = { HIGH: 3, MEDIUM: 2, LOW: 1 };
			return map[String(item?.severity || 'LOW').toUpperCase()] || 0;
		}

		function summarize() {
			const all = state.bugs;
			const open = all.filter((b) => String(b.status || '').toLowerCase() === 'open' || String(b.status || '').toLowerCase() === 'reopened').length;
			const fixing = all.filter((b) => String(b.status || '').toLowerCase() === 'fixing').length;
			const retest = all.filter((b) => ['in_retest', 'retest_failed'].includes(String(b.status || '').toLowerCase())).length;
			const resolved = all.filter((b) => ['closed', 'resolved'].includes(String(b.status || '').toLowerCase()) || b.autoClosed).length;
			const critical = all.filter((b) => bySeverity(b) >= 3).length;

			const cards = [
				['Abertos', open],
				['Fixing', fixing],
				['Retest', retest],
				['Resolved', resolved],
				['Críticos', critical],
			];

			el.metrics.innerHTML = cards
				.map(([label, value]) => `<div class="metric"><div class="muted">${label}</div><strong>${value}</strong></div>`)
				.join('');
			el.bugsCount.textContent = `${all.length} itens`;

			const activeCount = Array.isArray(state.retests.active) ? state.retests.active.length : 0;
			el.workerChip.textContent = activeCount > 0 ? 'Worker: running' : 'Worker: idle';
			el.queueChip.textContent = `Fila: ${activeCount}`;
		}

		async function api(path, options = {}) {
			const response = await fetch(path, {
				...options,
				headers: {
					...authHeaders(),
					...(options.headers || {}),
				},
			});
			const text = await response.text();
			let payload = null;
			try {
				payload = text ? JSON.parse(text) : null;
			} catch {
				payload = null;
			}
			if (!response.ok) {
				const err = new Error(payload?.error || `http_${response.status}`);
				err.payload = payload;
				throw err;
			}
			return payload;
		}

		async function ensureSeedBug() {
			if (state.bugs.length > 0) return;
			await api('/api/log', {
				method: 'POST',
				body: JSON.stringify({
					message: 'qa_seed_bug_for_dashboard_visibility',
					screen: 'Dashboard',
					stack: 'Error: seed\n at dashboard/index.html:1',
				}),
			});
		}

		async function refreshData() {
			setSessionChip();
			try {
				state.bugs = await api(`/api/bugs?limit=120&clientId=${encodeURIComponent(state.clientId)}`);
				await ensureSeedBug();
				state.bugs = await api(`/api/bugs?limit=120&clientId=${encodeURIComponent(state.clientId)}`);
				state.retests = await api(`/api/retests?limit=20&clientId=${encodeURIComponent(state.clientId)}`);
				state.learningSummary = await api(`/api/learning/summary?clientId=${encodeURIComponent(state.clientId)}`);
				state.aiStatus = await api(`/api/ai/status?clientId=${encodeURIComponent(state.clientId)}`);
			} catch (error) {
				state.bugs = [];
				state.learningSummary = null;
				state.aiStatus = null;
				state.retests = { active: [], history: [] };
			}
			render();
		}

		function renderLearning() {
			const summary = state.learningSummary || {};
			const aiStatus = state.aiStatus?.aiStatus || 'idle';
			el.aiStatusChip.textContent = `IA: ${aiStatus}`;
			el.aiStatusChip.className = `chip ${aiStatus === 'running' ? 'status-warn' : 'status-ok'}`;

			const topScreen = Array.isArray(summary.mostProblematicScreens) && summary.mostProblematicScreens.length
				? summary.mostProblematicScreens[0]
				: { key: '-', count: 0 };
			const topAction = Array.isArray(summary.mostProblematicActions) && summary.mostProblematicActions.length
				? summary.mostProblematicActions[0]
				: { key: '-', count: 0 };

			el.learningList.innerHTML = `
				<div class="item">
					<strong>Tela com mais erro</strong>
					<span class="mono">${topScreen.key}</span>
					<span class="muted">Ocorrências: ${Number(topScreen.count || 0)}</span>
				</div>
				<div class="item">
					<strong>Ação mais problemática</strong>
					<span class="mono">${topAction.key}</span>
					<span class="muted">Ocorrências: ${Number(topAction.count || 0)}</span>
				</div>
			`;
		}

		function listQueue() {
			const active = Array.isArray(state.retests.active) ? state.retests.active : [];
			const history = Array.isArray(state.retests.history) ? state.retests.history.slice(0, 8) : [];
			const rows = [];
			active.forEach((job) => {
				rows.push(`<div class="item"><strong>${job.mode || 'smoke'}</strong><span class="mono">${job.fingerprint || '-'}</span><span class="muted">${job.status || 'running'}</span></div>`);
			});
			history.forEach((job) => {
				rows.push(`<div class="item"><strong>${job.mode || 'smoke'}</strong><span class="mono">${job.fingerprint || '-'}</span><span class="muted">${job.status || 'unknown'}</span></div>`);
			});
			el.queueList.innerHTML = rows.join('') || '<div class="muted">Sem jobs na fila.</div>';
		}

		async function runAiFix(bug) {
			await api('/api/apply-fix', {
				method: 'POST',
				body: JSON.stringify({
					file: bug.file || bug.meta?.file || 'src/screens/HomeScreen.js',
					change: `AI fix request for: ${bug.message}`,
					meta: {
						fingerprint: bug.fingerprint,
						source: 'dashboard-manual',
					},
				}),
			});
			await refreshData();
		}

		async function runRetest(bug) {
			await api('/api/retest', {
				method: 'POST',
				body: JSON.stringify({
					fingerprint: bug.fingerprint,
					mode: 'smoke',
					meta: { origin: 'dashboard-button' },
				}),
			});
			await refreshData();
		}

		async function applyDecision(bug, decision, reason = 'manual_dashboard_action') {
			await api('/api/bug-decision', {
				method: 'POST',
				body: JSON.stringify({
					fingerprint: bug.fingerprint,
					decision,
					reason,
					expectedStatus: String(bug.status || ''),
					expectedCount: Number(bug.count || 0),
				}),
			});
			await refreshData();
		}

		function normalizeStatusLabel(rawStatus, autoClosed) {
			const status = String(rawStatus || '').toLowerCase();
			if (autoClosed || status === 'closed' || status === 'resolved') return 'resolved';
			if (status === 'in_retest' || status === 'retest_failed') return 'retest';
			if (status === 'fixing' || status === 'merge') return 'fixing';
			return 'open';
		}

		function statusChipClass(status) {
			if (status === 'resolved') return 'status-ok';
			if (status === 'retest') return 'status-warn';
			if (status === 'fixing') return 'status-warn';
			return 'status-danger';
		}

		function renderBugs() {
			const sorted = [...state.bugs].sort((a, b) => Number(b.count || 0) - Number(a.count || 0));
			el.bugsList.innerHTML = sorted.map((bug) => {
				const status = normalizeStatusLabel(bug.status, bug.autoClosed);
				const severity = String(bug.severity || 'LOW').toUpperCase();
				return `
					<article class="item">
						<div class="row">
							<strong>${bug.message || 'erro sem mensagem'}</strong>
							<span class="chip ${severity === 'HIGH' ? 'status-warn' : ''}">${severity}</span>
						</div>
						<div class="mono">${bug.fingerprint || '-'}</div>
						<div class="row">
							<span class="muted">Status: <span class="chip ${statusChipClass(status)}">${status}</span> | Count: ${Number(bug.count || 0)}</span>
							<span class="muted">Tela: ${bug.screen || '-'}</span>
						</div>
						<div class="actions">
							<button class="btn-accent" data-action="ai" data-fp="${bug.fingerprint}">Corrigir com IA</button>
							<button data-action="retest" data-fp="${bug.fingerprint}">Re-testar</button>
							<select class="select-compact" data-action="decision-select" data-fp="${bug.fingerprint}">
								<option value="resolver">resolver</option>
								<option value="rollback">rollback</option>
								<option value="merge">merge</option>
							</select>
							<button data-action="decision" data-fp="${bug.fingerprint}">Aplicar decisão</button>
						</div>
					</article>
				`;
			}).join('');

			el.bugsList.querySelectorAll('button[data-action]').forEach((button) => {
				button.addEventListener('click', async () => {
					const action = button.getAttribute('data-action');
					const fp = button.getAttribute('data-fp');
					const bug = state.bugs.find((item) => item.fingerprint === fp);
					if (!bug) return;
					try {
						if (action === 'ai') await runAiFix(bug);
						if (action === 'retest') await runRetest(bug);
						if (action === 'decision') {
							const select = el.bugsList.querySelector(`select[data-action="decision-select"][data-fp="${fp}"]`);
							const decision = select?.value || 'resolver';
							await applyDecision(bug, decision);
						}
					} catch (error) {
						console.error('dashboard-action-error', error.message);
					}
				});
			});
		}

		function render() {
			summarize();
			renderBugs();
			renderLearning();
			listQueue();
		}

		async function login() {
			const user = (el.adminUser.value || '').trim();
			const pass = (el.adminPass.value || '').trim();
			state.clientId = (el.clientId.value || 'admin').trim() || 'admin';
			const response = await fetch('/login', {
				method: 'POST',
				headers: { 'content-type': 'application/json' },
				body: JSON.stringify({ user, pass }),
			});
			const payload = await response.json();
			if (!response.ok || !payload?.token) {
				throw new Error(payload?.error || 'login_failed');
			}
			state.adminToken = payload.token;
			state.clientToken = payload.token;
			saveSession();
			await refreshData();
		}

		el.adminUser.value = localStorage.getItem('admin_user_cached') || 'admin@teste.com';
		el.adminPass.value = '';
		el.btnLogin.addEventListener('click', async () => {
			try {
				localStorage.setItem('admin_user_cached', el.adminUser.value || '');
				await login();
			} catch (error) {
				console.error('login-error', error.message);
			}
		});
		el.btnRefresh.addEventListener('click', refreshData);

		setSessionChip();
		refreshData();
	</script>
</body>
</html>
