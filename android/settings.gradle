pluginManagement {
  def reactNativeGradlePlugin = new File(
    providers.exec {
      workingDir(rootDir)
      commandLine("node", "--print", "require.resolve('@react-native/gradle-plugin/package.json', { paths: [require.resolve('react-native/package.json')] })")
    }.standardOutput.asText.get().trim()
  ).getParentFile().absolutePath
  includeBuild(reactNativeGradlePlugin)
  
  def expoPluginsPath = new File(
    providers.exec {
      workingDir(rootDir)
      commandLine("node", "--print", "require.resolve('expo-modules-autolinking/package.json', { paths: [require.resolve('expo/package.json')] })")
    }.standardOutput.asText.get().trim(),
    "../android/expo-gradle-plugin"
  ).absolutePath
  includeBuild(expoPluginsPath)
}

plugins {
  id("com.facebook.react.settings")
  id("expo-autolinking-settings")
}

expoAutolinking.projectRoot = settingsDir.parentFile

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
  if (System.getenv('EXPO_USE_COMMUNITY_AUTOLINKING') == '1') {
    ex.autolinkLibrariesFromCommand()
  } else {
    ex.autolinkLibrariesFromCommand(expoAutolinking.rnConfigCommand)
  }
}
expoAutolinking.useExpoModules()

rootProject.name = 'Evolucao'

expoAutolinking.useExpoVersionCatalog()

include ':app'

def nitroModulesDir = new File(rootDir, '../node_modules/react-native-nitro-modules/android')
if (nitroModulesDir.exists()) {
  include ':react-native-nitro-modules'
  project(':react-native-nitro-modules').projectDir = nitroModulesDir
}

// Detox deve ser incluido apenas em debug/test — nunca no build release.
// Auto-deteccao pelo nome da task (assembleRelease, bundleRelease).
// Override manual: export DETOX_ENABLED=0 para forcas exclusao.
def _releaseTaskRequested = gradle.startParameter.taskNames.any { name ->
    name.toLowerCase().contains('release') && !name.toLowerCase().contains('test')
}
def _detoxEnabled = !_releaseTaskRequested && System.getenv('DETOX_ENABLED') != '0'
gradle.ext.detoxEnabled = _detoxEnabled

if (_detoxEnabled) {
    include ':detox'
    project(':detox').projectDir = new File(rootProject.projectDir, '../node_modules/detox/android/detox')
}

includeBuild(expoAutolinking.reactNativeGradlePlugin)
