services:
  - type: web
    name: evolucao-api
    runtime: node
    rootDir: dashboard
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_QA_LOCAL_BYPASS
        value: "0"
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DEFAULT_CLIENT_ID
        sync: false
      - key: CLIENT_API_KEYS
        sync: false
      - key: CORS_ORIGIN
        value: ""
      - key: PUBLIC_API_BASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: evolucao-redis
          property: connectionString

  - type: worker
    name: evolucao-worker-ai
    runtime: node
    rootDir: dashboard
    plan: starter
    buildCommand: npm install
    startCommand: npm run start:worker:ai
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_QA_LOCAL_BYPASS
        value: "0"
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DEFAULT_CLIENT_ID
        sync: false
      - key: CLIENT_API_KEYS
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: evolucao-redis
          property: connectionString

  - type: worker
    name: evolucao-worker-fix
    runtime: node
    rootDir: dashboard
    plan: starter
    buildCommand: npm install
    startCommand: npm run start:worker:fix
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_QA_LOCAL_BYPASS
        value: "0"
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DEFAULT_CLIENT_ID
        sync: false
      - key: CLIENT_API_KEYS
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: evolucao-redis
          property: connectionString

  - type: worker
    name: evolucao-worker-retest
    runtime: node
    rootDir: dashboard
    plan: starter
    buildCommand: npm install
    startCommand: npm run start:worker:retest
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_QA_LOCAL_BYPASS
        value: "0"
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DEFAULT_CLIENT_ID
        sync: false
      - key: CLIENT_API_KEYS
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: evolucao-redis
          property: connectionString

  - type: redis
    name: evolucao-redis
    plan: starter
    maxmemoryPolicy: noeviction
