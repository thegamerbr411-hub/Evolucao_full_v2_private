services:
  - type: web
    name: evolucao-api
    runtime: node
    plan: free
    buildCommand: npm --prefix backend install
    startCommand: npm --prefix backend start
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_QA_LOCAL_BYPASS
        value: "0"
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASS
        value: fe123456$@
      - key: JWT_SECRET
        value: d94e664ba7a33757841043693cace8362b9c5337ea1e56733d7739c400cf5cfc
      - key: DEFAULT_CLIENT_ID
        value: admin
      - key: CLIENT_API_KEYS
        value: '{"admin":"5yrfrykNa7OrIfFbqRHQLkxHp1U_mL80"}'
      - key: APP_API_KEY
        value: JGAhyl7uYjN3VpxKHnzMPcdBKzwmzlJB
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: noreply@evolucao.app
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: noreply@evolucao.app
      - key: PASSWORD_RESET_URL
        sync: false
