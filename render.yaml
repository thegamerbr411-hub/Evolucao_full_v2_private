services:
  - type: web
    name: evolucao-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node dashboard/server.js
    autoDeploy: true
    envVars:
      - key: ADMIN_EMAIL
        value: admin@teste.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DEFAULT_CLIENT_ID
        value: admin
      - key: CLIENT_API_KEYS
        sync: false
      - key: RATE_LIMIT_MAX
        value: "180"
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: BUGS_CACHE_TTL_MS
        value: "5000"
