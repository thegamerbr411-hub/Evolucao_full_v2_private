services:
  - type: web
    name: evolucao-api
    runtime: node
    runtimeVersion: 20
    plan: free
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_QA_LOCAL_BYPASS
        value: "0"
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DEFAULT_CLIENT_ID
        sync: false
      - key: CLIENT_API_KEYS
        sync: false
      - key: APP_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: noreply@evolucao.app
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: noreply@evolucao.app
      - key: PASSWORD_RESET_URL
        sync: false
